name: PR Template Enforcement

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [main]

jobs:
  validate-template:
    name: Validate PR body template sections
    runs-on: ubuntu-latest
    steps:
      - name: Ensure required PR sections exist
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request?.body || '').trim();
            const requiredSections = [
              '## Summary',
              '## Related Post / Preview',
              '## Content Checklist',
              '## Testing',
            ];

            const missing = requiredSections.filter(section => !body.includes(section));
            if (missing.length > 0) {
              core.setFailed(
                [
                  'PR body is missing required template section(s):',
                  ...missing.map(section => `- ${section}`),
                  '',
                  'Please use the repository template at .github/pull_request_template.md.',
                ].join('\n')
              );
            }
